<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Frontend</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/logo-assets/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo-assets/claudeforge-icon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/logo-assets/claudeforge-icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo-assets/claudeforge-icon-180.png" />
    <!--
      Anti-FOUC (Flash-of-Wrong-Theme) inline script — design.md D5.
      Runs render-blocking BEFORE Angular bootstraps. Reads the persisted
      theme preference (key "cf.theme") from localStorage with a fallback to
      prefers-color-scheme, then applies the ".dark" class to <html>
      synchronously. This guarantees the correct palette is visible on first
      paint; the ThemeService in Angular picks up the same key after hydration
      and takes over without double-toggling.
      Key "cf.theme" is the canonical storage key (ThemeService.THEME_STORAGE_KEY).
      Pure vanilla JS — zero external dependencies.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('cf.theme');
          var prefersDark = !stored && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || prefersDark) {
            document.documentElement.classList.add('dark');
          }
        } catch (_) {
          // localStorage may be blocked in some browser contexts; silently skip.
        }
      })();
    </script>
  </head>
  <body>
    <cf-root></cf-root>
  </body>
</html>
