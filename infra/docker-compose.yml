name: claudeforge-dev

# ─── Usage ────────────────────────────────────────────────────────────────────
# Default stack (api + web + postgres):
#   docker compose up
#
# Include optional Qdrant semantic-search service:
#   docker compose --profile semantic up
#
# One-command start with live-reload:
#   make up           (or: npm run dev:up from repo root)
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── .NET API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    container_name: cf-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-plugin_marketplace};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-devpassword}"
      PackageStorage__Type: "${PackageStorage__Type:-LocalFileSystem}"
      PackageStorage__LocalPath: /packages
      Features__QdrantEnabled: "${Features__QdrantEnabled:-false}"
      Features__TelemetryRetention: "${Features__TelemetryRetention:-90}"
      # Feature flag: flip to true for Phase 3 (require auth to upload)
      Features__RequireAuthForUpload: "${Features__RequireAuthForUpload:-false}"
      # ── OIDC ──────────────────────────────────────────────────────────────
      OIDC__ENABLEDPROVIDERS: "${OIDC__ENABLEDPROVIDERS:-google,microsoft}"
      OIDC__ALLOWEDLOOPBACKREDIRECT: "${OIDC__ALLOWEDLOOPBACKREDIRECT:-http://127.0.0.1}"
      OIDC__GOOGLE__CLIENTID: "${OIDC__GOOGLE__CLIENTID}"
      OIDC__GOOGLE__CLIENTSECRET: "${OIDC__GOOGLE__CLIENTSECRET}"
      OIDC__GOOGLE__REDIRECTURI: "${OIDC__GOOGLE__REDIRECTURI:-http://localhost:5010/auth/callback}"
      OIDC__MICROSOFT__CLIENTID: "${OIDC__MICROSOFT__CLIENTID}"
      OIDC__MICROSOFT__CLIENTSECRET: "${OIDC__MICROSOFT__CLIENTSECRET}"
      OIDC__MICROSOFT__TENANT: "${OIDC__MICROSOFT__TENANT:-common}"
      OIDC__MICROSOFT__REDIRECTURI: "${OIDC__MICROSOFT__REDIRECTURI:-http://localhost:5010/auth/callback}"
      # ── JWT ───────────────────────────────────────────────────────────────
      JWT__ISSUER: "${JWT__ISSUER:-https://api.claudeforge.dev}"
      JWT__AUDIENCE: "${JWT__AUDIENCE:-claudeforge-spa-cli}"
      JWT__ACCESSTOKENMINUTES: "${JWT__ACCESSTOKENMINUTES:-15}"
      JWT__REFRESHTOKENDAYS: "${JWT__REFRESHTOKENDAYS:-30}"
      # RS256 private key is mounted as a secret file — the backend reads it
      # from /run/secrets/jwt_private_pem at startup. Do NOT set the key inline.
      JWT__SIGNINGKEY__PRIVATEPEM_FILE: /run/secrets/jwt_private_pem
      # ── Email (SMTP) ───────────────────────────────────────────────────────
      EMAIL__SMTPHOST: "${EMAIL__SMTPHOST:-smtp.example.com}"
      EMAIL__SMTPPORT: "${EMAIL__SMTPPORT:-587}"
      EMAIL__SMTPUSER: "${EMAIL__SMTPUSER}"
      EMAIL__SMTPPASSWORD: "${EMAIL__SMTPPASSWORD}"
      EMAIL__FROM: "${EMAIL__FROM:-noreply@claudeforge.dev}"
    ports:
      - "5010:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - ../packages:/packages
      - dotnet-watch-cache:/root/.nuget
    secrets:
      - jwt_private_pem
    networks:
      - cf-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  # ─── Angular Frontend ─────────────────────────────────────────────────────
  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    container_name: cf-web
    environment:
      API_BASE_URL: "${API_BASE_URL:-http://localhost:5010/api/v1}"
    ports:
      - "4200:4200"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ../frontend:/app
      - frontend-node-modules:/app/node_modules
    networks:
      - cf-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4200 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ─── PostgreSQL 16 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16.9-alpine3.21
    container_name: cf-postgres
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-devpassword}"
      POSTGRES_DB: "${POSTGRES_DB:-plugin_marketplace}"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../packages:/packages
    networks:
      - cf-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-plugin_marketplace}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ─── Qdrant (optional — requires --profile semantic) ──────────────────────
  # Usage: docker compose --profile semantic up
  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: cf-qdrant
    profiles:
      - semantic
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - cf-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

volumes:
  postgres-data:
  qdrant-data:
  dotnet-watch-cache:
  frontend-node-modules:

# ─── Secrets ─────────────────────────────────────────────────────────────────
# The RS256 private key is mounted as a Docker secret so it is NEVER baked into
# the image or set as a plain env var visible in `docker inspect`.
#
# Dev setup — generate the key once and place it at infra/secrets/jwt_private.pem:
#   mkdir -p infra/secrets
#   openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:4096 \
#     -out infra/secrets/jwt_private.pem
#   chmod 600 infra/secrets/jwt_private.pem
#
# The infra/secrets/ directory is git-ignored (see .gitignore).
secrets:
  jwt_private_pem:
    file: ./secrets/jwt_private.pem

networks:
  cf-net:
    driver: bridge
