name: claudeforge-dev

# ─── Usage ────────────────────────────────────────────────────────────────────
# Default stack (api + web + postgres):
#   docker compose up
#
# Include optional Qdrant semantic-search service:
#   docker compose --profile semantic up
#
# One-command start with live-reload:
#   make up           (or: npm run dev:up from repo root)
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── .NET API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    container_name: cf-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DOTNET_WATCH_SUPPRESS_LAUNCH_BROWSER: "1"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-plugin_marketplace};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-devpassword}"
      PackageStorage__Type: "${PackageStorage__Type:-LocalFileSystem}"
      PackageStorage__LocalPath: /packages
      Features__QdrantEnabled: "${Features__QdrantEnabled:-false}"
      Features__TelemetryRetention: "${Features__TelemetryRetention:-90}"
      # Feature flag: flip to true for Phase 3 (require auth to upload)
      Features__RequireAuthForUpload: "${Features__RequireAuthForUpload:-false}"
      # ── OIDC ──────────────────────────────────────────────────────────────
      OIDC__ENABLEDPROVIDERS: "${OIDC__ENABLEDPROVIDERS:-google,microsoft}"
      OIDC__ALLOWEDLOOPBACKREDIRECT: "${OIDC__ALLOWEDLOOPBACKREDIRECT:-http://127.0.0.1}"
      OIDC__GOOGLE__CLIENTID: "${OIDC__GOOGLE__CLIENTID}"
      OIDC__GOOGLE__CLIENTSECRET: "${OIDC__GOOGLE__CLIENTSECRET}"
      OIDC__GOOGLE__REDIRECTURI: "${OIDC__GOOGLE__REDIRECTURI:-http://localhost:5010/auth/callback}"
      OIDC__MICROSOFT__CLIENTID: "${OIDC__MICROSOFT__CLIENTID}"
      OIDC__MICROSOFT__CLIENTSECRET: "${OIDC__MICROSOFT__CLIENTSECRET}"
      OIDC__MICROSOFT__TENANT: "${OIDC__MICROSOFT__TENANT:-common}"
      OIDC__MICROSOFT__REDIRECTURI: "${OIDC__MICROSOFT__REDIRECTURI:-http://localhost:5010/auth/callback}"
      # ── JWT ───────────────────────────────────────────────────────────────
      JWT__ISSUER: "${JWT__ISSUER:-https://api.claudeforge.dev}"
      JWT__AUDIENCE: "${JWT__AUDIENCE:-claudeforge-spa-cli}"
      JWT__ACCESSTOKENMINUTES: "${JWT__ACCESSTOKENMINUTES:-15}"
      JWT__REFRESHTOKENDAYS: "${JWT__REFRESHTOKENDAYS:-30}"
      # RS256 private key is mounted as a secret file — the backend reads it
      # from /run/secrets/jwt_private_pem at startup. Do NOT set the key inline.
      JWT__SIGNINGKEY__PRIVATEPEM_FILE: /run/secrets/jwt_private_pem
      # ── Email (SMTP) ───────────────────────────────────────────────────────
      EMAIL__SMTPHOST: "${EMAIL__SMTPHOST:-smtp.example.com}"
      EMAIL__SMTPPORT: "${EMAIL__SMTPPORT:-587}"
      EMAIL__SMTPUSER: "${EMAIL__SMTPUSER}"
      EMAIL__SMTPPASSWORD: "${EMAIL__SMTPPASSWORD}"
      EMAIL__FROM: "${EMAIL__FROM:-noreply@claudeforge.dev}"
    ports:
      - "5010:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../backend:/app
      # Anonymous volumes shadow the host obj/ and bin/ directories so that
      # Windows-host build artifacts (backslash paths, Windows PE binaries) never
      # leak into the Linux container. The container builds entirely inside the
      # anonymous volume; the host tree stays clean.
      - /app/ClaudeForge.Api/obj
      - /app/ClaudeForge.Api/bin
      - /app/ClaudeForge.Application/obj
      - /app/ClaudeForge.Application/bin
      - /app/ClaudeForge.Core/obj
      - /app/ClaudeForge.Core/bin
      - /app/ClaudeForge.Infrastructure/obj
      - /app/ClaudeForge.Infrastructure/bin
      - /app/ClaudeForge.Tests/obj
      - /app/ClaudeForge.Tests/bin
      - /app/ClaudeForge.ArchTests/obj
      - /app/ClaudeForge.ArchTests/bin
      - ../packages:/packages
      - dotnet-watch-cache:/root/.nuget
    secrets:
      - jwt_private_pem
    networks:
      - cf-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  # ─── Angular Frontend (dev: ng serve with native HMR / live reload) ─────────
  web:
    build:
      context: ..                      # repo root — frontend is an npm workspace; root
      dockerfile: frontend/Dockerfile.dev  # package-lock.json is the authoritative lockfile
    container_name: cf-web
    environment:
      # Allow the V8 heap to grow — esbuild incremental builds can be memory-hungry.
      NODE_OPTIONS: "--max-old-space-size=2048"
    ports:
      - "4000:4000"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      # Bind-mount frontend source so host edits are immediately visible inside
      # the container to ng serve's file watcher (polling via --poll=500 in CMD).
      - ../frontend:/repo/frontend
      # Anonymous volumes shadow directories that must NOT be overwritten by the
      # host bind-mount above. Without these, docker would overlay the empty host
      # paths on top of the container-installed modules/build output.
      #
      # Workspace root node_modules: installed by npm ci inside the image; must
      # not be clobbered by the ../frontend bind-mount.
      - /repo/node_modules
      # Frontend-local node_modules (hoisted workspace packages may land here).
      - /repo/frontend/node_modules
      # Angular persistent build cache must stay inside the container — the host's
      # cache is built with a different (darwin) esbuild binary and would corrupt
      # the linux/musl incremental compilation.
      - /repo/frontend/.angular
    networks:
      - cf-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      # ng serve performs an initial build before it starts serving; allow time.
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # ─── PostgreSQL 16 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16.9-alpine3.21
    container_name: cf-postgres
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-devpassword}"
      POSTGRES_DB: "${POSTGRES_DB:-plugin_marketplace}"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../packages:/packages
    networks:
      - cf-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-plugin_marketplace}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ─── Qdrant (optional — requires --profile semantic) ──────────────────────
  # Usage: docker compose --profile semantic up
  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: cf-qdrant
    profiles:
      - semantic
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - cf-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

volumes:
  postgres-data:
  qdrant-data:
  dotnet-watch-cache:

# ─── Secrets ─────────────────────────────────────────────────────────────────
# The RS256 private key is mounted as a Docker secret so it is NEVER baked into
# the image or set as a plain env var visible in `docker inspect`.
#
# Dev setup — generate the key once and place it at infra/secrets/jwt_private.pem:
#   mkdir -p infra/secrets
#   openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:4096 \
#     -out infra/secrets/jwt_private.pem
#   chmod 600 infra/secrets/jwt_private.pem
#
# The infra/secrets/ directory is git-ignored (see .gitignore).
secrets:
  jwt_private_pem:
    file: ./secrets/jwt_private.pem

networks:
  cf-net:
    driver: bridge
